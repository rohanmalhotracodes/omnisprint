name: team_context
version: 0.1.0
dsl_version: 3
backend: file
test_queries:
  - SELECT * FROM team_context.members LIMIT 1
tables:
  - name: members
    description: Contributor directory snapshot (name/email/team/role)
    format: jsonl
    source:
      location: __DATA_DIR__
      glob: "team_snapshot.jsonl"
    columns:
      - name: name
        type: Utf8
      - name: team
        type: Utf8
      - name: role
        type: Utf8
      - name: github_handle
        type: Utf8
      - name: email
        type: Utf8
