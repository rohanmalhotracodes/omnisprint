<svg viewBox="0 0 160 280" xmlns="http://www.w3.org/2000/svg">
  <title>OmniSprint Logo Stacked - Dot Grid</title>
  <desc>Dot grid mark above wordmark in vertical layout</desc>
  
  <!-- Logo mark centered - 6 colored dots -->
  <g transform="translate(20, 20)">
    <!-- Top row: Blue, Green, Orange -->
    <circle cx="25" cy="25" r="15" fill="#3B82F6"/>
    <circle cx="60" cy="25" r="15" fill="#10B981"/>
    <circle cx="95" cy="25" r="15" fill="#F59E0B"/>
    
    <!-- Bottom row: Pink, Purple, Red -->
    <circle cx="25" cy="95" r="15" fill="#EC4899"/>
    <circle cx="60" cy="95" r="15" fill="#8B5CF6"/>
    <circle cx="95" cy="95" r="15" fill="#EF4444"/>
  </g>
  
  <!-- Wordmark below -->
  <text x="80" y="230" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="500" fill="#111827" letter-spacing="-1.5" text-anchor="middle">omnisprint</text>
</svg>
