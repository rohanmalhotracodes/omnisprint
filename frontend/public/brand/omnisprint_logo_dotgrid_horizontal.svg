<svg viewBox="0 0 480 140" xmlns="http://www.w3.org/2000/svg">
  <title>OmniSprint Logo - Dot Grid Full</title>
  <desc>Dot grid mark with wordmark in horizontal layout</desc>
  
  <!-- Logo mark - 6 colored dots -->
  <g transform="translate(20, 20)">
    <!-- Top row: Blue, Green, Orange -->
    <circle cx="25" cy="25" r="15" fill="#3B82F6"/>
    <circle cx="60" cy="25" r="15" fill="#10B981"/>
    <circle cx="95" cy="25" r="15" fill="#F59E0B"/>
    
    <!-- Bottom row: Pink, Purple, Red -->
    <circle cx="25" cy="95" r="15" fill="#EC4899"/>
    <circle cx="60" cy="95" r="15" fill="#8B5CF6"/>
    <circle cx="95" cy="95" r="15" fill="#EF4444"/>
  </g>
  
  <!-- Wordmark -->
  <text x="160" y="95" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="500" fill="#111827" letter-spacing="-2">omnisprint</text>
</svg>
